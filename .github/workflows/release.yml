name: release

# Triggered by pushing a semver tag (e.g. v0.1.0). Builds release binaries
# for macOS (arm64, x86_64) and Linux (x86_64, aarch64), uploads them with
# a SHA256SUMS manifest, and creates a GitHub Release.

on:
  push:
    tags:
      - "v*"

env:
  HOMEBREW_TAP_REPO: liteconfig/homebrew-tap

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross (linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "$TARGET" -p liteconfig-tui
          else
            cargo build --release --target "$TARGET" -p liteconfig-tui
          fi

      - name: Stage artifact
        id: stage
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          asset="liteconfig-${TAG}-${TARGET}.tar.gz"
          mkdir -p dist
          cp "target/${TARGET}/release/liteconfig" "dist/liteconfig"
          tar -C dist -czf "dist/${asset}" liteconfig
          rm dist/liteconfig
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ steps.stage.outputs.asset }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          set -eu
          shasum -a 256 liteconfig-*.tar.gz | sort > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist/liteconfig-*.tar.gz dist/SHA256SUMS \
              --clobber
          else
            gh release create "$TAG" \
              --title "liteconfig ${TAG}" \
              --generate-notes \
              dist/liteconfig-*.tar.gz dist/SHA256SUMS
          fi

  publish-tap:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          set -eu
          shasum -a 256 liteconfig-*.tar.gz | sort > SHA256SUMS

      - name: Render Homebrew formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node scripts/render-homebrew-formula.js \
            "$TAG" \
            packaging/homebrew/liteconfig.rb \
            dist/SHA256SUMS \
            dist/liteconfig.rb

      - name: Publish tap formula
        env:
          TAG: ${{ github.ref_name }}
          TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -eu
          test -n "${TAP_GITHUB_TOKEN}" || {
            echo "HOMEBREW_TAP_GITHUB_TOKEN is required to publish ${HOMEBREW_TAP_REPO}" >&2
            exit 1
          }
          git clone --depth=1 \
            "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" \
            tap
          mkdir -p tap/Formula
          cp dist/liteconfig.rb tap/Formula/liteconfig.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/liteconfig.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date"
            exit 0
          fi
          git commit -m "liteconfig ${TAG}"
          git push origin HEAD

  smoke-homebrew:
    needs: publish-tap
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Ensure Homebrew is available
        shell: bash
        run: |
          set -eu
          if command -v brew >/dev/null 2>&1; then
            brew --version
            exit 0
          fi
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew --version

      - name: Install liteconfig from tap
        shell: bash
        run: |
          set -eu
          brew tap liteconfig/tap "https://github.com/${HOMEBREW_TAP_REPO}"
          if [ "${RUNNER_OS}" = "Linux" ]; then
            brew trust liteconfig/tap
          fi
          brew install liteconfig
          liteconfig --version

  publish-npm:
    needs: smoke-homebrew
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Verify npm wrapper
        run: pnpm check:js
      - name: Publish npm launcher
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks --registry https://registry.npmjs.org
