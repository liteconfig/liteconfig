name: release

# Triggered by pushing a semver tag (e.g. v0.1.0). Builds release binaries
# for macOS (arm64, x86_64) and Linux (x86_64, aarch64), uploads them with
# a SHA256SUMS manifest, and creates a GitHub Release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross (linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "$TARGET" -p liteconfig-tui
          else
            cargo build --release --target "$TARGET" -p liteconfig-tui
          fi

      - name: Stage artifact
        id: stage
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          asset="liteconfig-${TAG}-${TARGET}.tar.gz"
          mkdir -p dist
          cp "target/${TARGET}/release/liteconfig" "dist/liteconfig"
          tar -C dist -czf "dist/${asset}" liteconfig
          rm dist/liteconfig
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ steps.stage.outputs.asset }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          set -eu
          shasum -a 256 liteconfig-*.tar.gz | sort > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "liteconfig ${TAG}" \
            --generate-notes \
            dist/liteconfig-*.tar.gz dist/SHA256SUMS

  publish-npm:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Verify npm wrapper
        run: pnpm check:js
      - name: Publish npm launcher
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks --registry https://registry.npmjs.org
